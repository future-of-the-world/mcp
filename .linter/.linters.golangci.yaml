        - S1038
        - S1040
        - QF1001
        - QF1002
        - QF1003
        - QF1005
        - QF1006
        - QF1007
        - QF1008
        - QF1010
    tagalign:
      align: true
      sort: true
      order:
        - json
        - yaml
        - yml
        - toml
        - mapstructure
        - binding
        - validate
      strict: false
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
          xml: snake
          toml: snake
          bson: snake
          avro: snake
          mapstructure: snake
          env: upperSnake
          envconfig: upperSnake
        use-field-name: false
        ignored-fields: []
        overrides: []
    testifylint:
      enable-all: false
      disable: []
      disable-all: true
      enable:
        - blank-import
        - bool-compare
        - compares
        - contains
        - empty
        - encoded-compare
        - equal-values
        - error-is-as
        - error-nil
        - expected-actual
        - float-compare
        - formatter
        - go-require
        - len
        - negative-positive
        - nil-compare
        - regexp
        - require-error
        - suite-broken-parallel
        - suite-dont-use-pkg
        - suite-extra-assert-call
        - suite-method-signature
        - suite-subtest-run
        - useless-assert
      bool-compare:
        ignore-custom-types: false
      expected-actual:
        pattern: (^(exp(ected)?|want(ed)?)([A-Z]\w*)?$)|(^(\w*[a-z])?(Exp(ected)?|Want(ed)?)$)
      formatter:
        check-format-string: true
        require-f-funcs: true
        require-string-msg: false
      go-require:
        ignore-http-handlers: false
      require-error:
        fn-pattern: ""
      suite-extra-assert-call:
        mode: require
    thelper:
      test:
        first: true
        name: true
        begin: false
      benchmark:
        first: true
        name: true
        begin: false
      tb:
        first: true
        name: true
        begin: false
      fuzz:
        first: true
        name: true
        begin: false
    unconvert:
      fast-math: false
      safe: false
    unparam:
      check-exported: true
    unqueryvet:
      check-sql-builders: true
      allowed-patterns:
        - "SELECT \\* FROM information_schema\\..*"
        - "SELECT \\* FROM pg_catalog\\..*"
        - "SELECT COUNT\\(\\*\\)"
        - "SELECT MAX\\(\\*\\)"
        - "SELECT MIN\\(\\*\\)"
    unused:
      field-writes-are-uses: true
      post-statements-are-reads: true
      exported-fields-are-used: true
      parameters-are-used: true
      local-variables-are-used: true
      generated-is-used: true
    usestdlibvars:
      http-method: true
      http-status-code: true
      time-date-month: true
      time-weekday: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
      constant-kind: true
    usetesting:
      os-create-temp: true
      os-mkdir-temp: true
      os-setenv: true
      os-temp-dir: true
      os-chdir: true
      context-background: true
      context-todo: true
    varnamelen:
      max-distance: 1
      min-name-length: 3
      check-receiver: false
      check-return: true
      check-type-param: false
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
      ignore-names:
        - err
        - ctx
      ignore-decls:
        - ok bool
        - db *sql.DB
        - db *sqlx.DB
        - wg sync.WaitGroup
        - wg *sync.WaitGroup
        - mu *sync.Mutex
        - mu sync.Mutex
        - r *http.Request
        - w http.ResponseWriter
        - w io.Writer
        - r io.Reader
        - i int
    whitespace:
      multi-if: true
      multi-func: false
    wrapcheck:
      extra-ignore-sigs: []
      ignore-sigs:
        [
          ".Errorf(",
          "errors.New(",
          "errors.Unwrap(",
          "errors.Join(",
          ".Wrap(",
          ".Wrapf(",
          ".WithMessage(",
          ".WithMessagef(",
          ".WithStack(",
        ]
      ignore-sig-regexps: []
      ignore-package-globs: []
      ignore-interface-regexps: []
      report-internal-errors: false
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 4
      case-max-lines: -1
      default: none
      enable:
        - assign
        - branch
        - decl
        - defer
        - for
        - go
        - if
        - label
        - range
        - return
        - select
        - send
        - switch
        - type-switch
        - append
        - assign-exclusive
        - assign-expr
        - err
      disable: []
  exclusions:
    warn-unused: false
    rules:
      - path: .rules.go
        linters:
          - unused
      - path: _test\.go
        linters:
          - forcetypeassert
          - unqueryvet
      - source: "^func Test"
        linters:
          - funlen
      - source: "^func main()"
        linters:
          - funlen
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines
    - swaggo
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com)
        - prefix(golang.org)
        - blank
        - dot
        - alias
        - localmodule
      no-inline-comments: true
      no-prefix-comments: true
      custom-order: true
      no-lex-order: false
    gofmt:
      simplify: true
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
        - pattern: "uuid.Nil"
          replacement: "(uuid.UUID{})"
    gofumpt:
      module-path: ""
      extra-rules: true
    goimports:
      local-prefixes: []
    golines:
      max-len: 100
      tab-len: 4
      shorten-comments: true
      reformat-tags: true
      chain-split-dots: true
run:
  timeout: "1m"
  issues-exit-code: 1
  tests: true
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: false
  uniq-by-line: false
