version: "2"
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bodyclose
    - canonicalheader
    - contextcheck
    - depguard
    - dupl
    - durationcheck
    - embeddedstructfieldcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - gocheckcompilerdirectives
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gosec
    - govet
    - iface
    - inamedparam
    - ineffassign
    - interfacebloat
    - iotamixing
    - lll
    - loggercheck
    - makezero
    - mirror
    - misspell
    - modernize
    - musttag
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - noinlineerr
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagliatelle
    - testableexamples
    - testifylint
    - thelper
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    cyclop:
      max-complexity: 5
      package-average: 0.0
    depguard:
      rules:
        archived:
          deny:
            - pkg: "github.com/golang/mock"
              desc: "this package is archived, use go.uber.org/mock/mockgen"
        rand:
          deny:
            - pkg: "math/rand"
              desc: "use crypto/rand"
            - pkg: "math/rand/v2"
              desc: "use crypto/rand"
        crypto:
          deny:
            - pkg: "crypto/md5"
              desc: "weak crypto algoritm"
            - pkg: "crypto/sha1"
              desc: "weak crypto algoritm"
            - pkg: "crypto/des"
              desc: "weak crypto algoritm"
            - pkg: "crypto/rc4"
              desc: "weak crypto algoritm"
            - pkg: "golang.org/x/crypto/md4"
              desc: "weak crypto algoritm"
            - pkg: "golang.org/x/crypto/ripemd160"
              desc: "weak crypto algoritm"
    errcheck:
      check-type-assertions: false
      check-blank: true
      disable-default-exclusions: true
      exclude-functions:
        - encoding/json.Marshal
        - encoding/json.MarshalIndent
        - (*os.File).Close
        - (*database/sql.Rows).Close
        - (*github.com/jmoiron/sqlx.Rows).Close
        - (*bytes.Buffer).Write
        - (*bytes.Buffer).WriteByte
        - (*bytes.Buffer).WriteRune
        - (*bytes.Buffer).WriteString
        - crypto/rand.Read
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - fmt.Fprint(*bytes.Buffer)
        - fmt.Fprintf(*bytes.Buffer)
        - fmt.Fprintln(*bytes.Buffer)
        - fmt.Fprint(*strings.Builder)
        - fmt.Fprintf(*strings.Builder)
        - fmt.Fprintln(*strings.Builder)
        - fmt.Fprint(os.Stderr)
        - fmt.Fprintf(os.Stderr)
        - fmt.Fprintln(os.Stderr)
        - (*io.PipeReader).CloseWithError
        - (*io.PipeWriter).CloseWithError
        - math/rand.Read
        - (*math/rand.Rand).Read
        - (*strings.Builder).Write
        - (*strings.Builder).WriteByte
        - (*strings.Builder).WriteRune
        - (*strings.Builder).WriteString
        - (hash.Hash).Write
        - (*hash/maphash.Hash).Write
        - (*hash/maphash.Hash).WriteByte
        - (*hash/maphash.Hash).WriteString
    errchkjson:
      report-no-exported: true
      check-error-free-encoding: true
    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true
    exhaustruct:
      allow-empty: true
      exclude:
        - '.+/http\.Server$'
        - '.+/http\.Client$'
        - '.+/http\.Transport$'
        - '.+/cobra\.Command$'
        - ".*Opts$"
        - ".*Options$"
        - ".*Config$"
    forbidigo:
      forbid:
        - pattern: ^(fmt.Print(|f|ln)|print|println)$
          msg: direct output to stdout is forbidden
        - pattern: uuid.Nil
          msg: prefer use uuid.UUID{} as zero value, because uuid.Nil is global variable and can be reassigned
        - pattern: sql.LevelDefault
          msg: use concrete isolation level, not default
        - pattern: runtime.SetFinalizer
          msg: use runtime.AddCleaup modern and safer implementation
        - pattern: (?i)\b\w*ctx\.Err\b
          msg: prefer context.Cause(ctx) over ctx.Err(); context.Cause unwraps the cause and returns the original error (go 1.20+)
        - pattern: signal\.Notify\b
          msg: prefer signal.NotifyContext; context.Cause(ctx) returns error containing signal name (go 1.26+)
        - pattern: http\.DefaultClient\b
          msg: http.DefaultClient is a shared global; closing its idle connections or setting timeouts affects all users — create an explicit *http.Client instead
        - pattern: http\.DefaultTransport\b
          msg: http.DefaultTransport is a shared global; modifying it (CloseIdleConnections, TLS config, timeouts) affects all users — create an explicit *http.Transport instead
    funlen:
      lines: -1
      statements: 40
      ignore-comments: true
    gochecksumtype:
      default-signifies-exhaustive: false
      include-shared-interfaces: false
    gocognit:
      min-complexity: 10
    gocritic:
      disable-all: true
      enable-all: false
      enabled-checks:
        - appendAssign
        - appendCombine
        - argOrder
        - assignOp
        - badCall
        - badCond
        - badLock
        - badRegexp
        - badSyncOnceFunc
        - boolExprSimplify
        - captLocal
        - caseOrder
        - codegenComment
        - commentFormatting
        - commentedOutCode
        - commentedOutImport
        - deferUnlambda
        - deprecatedComment
        - dupArg
        - dupImport
        - dupOption
        - dynamicFmtString
        - elseif
        - emptyDecl
        - emptyStringTest
        - equalFold
        - evalOrder
        - exitAfterDefer
        - externalErrorReassign
        - filepathJoin
        - flagDeref
        - flagName
        - hexLiteral
        - httpNoBody
        - hugeParam
        - ifElseChain
        - indexAlloc
        - initClause
        - nestingReduce
        - newDeref
        - nilValReturn
        - octalLiteral
        - offBy1
        - paramTypeCombine
        - preferDecodeRune
        - preferFilepathJoin
        - preferFprint
        - preferWriteByte
        - ptrToRefParam
        - rangeExprCopy
        - rangeValCopy
        - redundantSprint
        - regexpMust
        - regexpPattern
        - regexpSimplify
        - returnAfterHttpError
        - singleCaseSwitch
        - sloppyReassign
        - sloppyTypeAssert
        - sortSlice
        - sprintfQuotedString
        - sqlQuery
        - stringConcatSimplify
        - stringXbytes
        - stringsCompare
        - switchTrue
        - syncMapLoadAndDelete
        - timeExprSimplify
        - todoCommentWithoutDetail
        - typeAssertChain
        - typeDefFirst
        - typeUnparen
        - uncheckedInlineErr
        - underef
        - unlabelStmt
        - unlambda
        - unnecessaryBlock
        - unnecessaryDefer
        - unslice
        - valSwap
        - weakCond
        - wrapperFunc
        - yodaStyleExpr
        - zeroByteRepeat
    gosec:
      config:
        G306: "0o666"
      includes:
        - G101
        - G102
        - G103
        - G106
        - G108
        - G110
        - G111
        - G112
        - G114
        - G115
        - G201
        - G202
        - G203
        - G301
        - G302
        - G303
        - G305
        - G306
        - G307
        - G402
        - G403
    govet:
      disable-all: true
      enable:
        - asmdecl
        - atomic
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - deepequalerrors
        - defers
        - directive
        - errorsas
        - framepointer
        - hostport
        - httpmux
        - loopclosure
        - lostcancel
        - nilness
        - printf
        - reflectvaluecompare
        - shadow
        - sigchanyzer
        - sortslice
        - stdmethods
        - stdversion
        - stringintconv
        - testinggoroutine
        - tests
        - timeformat
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedwrite
        - waitgroup
    grouper:
      const-require-single-const: true
      const-require-grouping: true
      import-require-single-import: true
      import-require-grouping: true
      type-require-single-type: true
      type-require-grouping: true
      var-require-single-var: true
      var-require-grouping: true
    iface:
      enable:
        - identical
        - unexported
    importas:
      no-unaliased: false
      no-extra-aliases: false
      alias: []
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - Service$
        - Span$
    lll:
      line-length: 100
      tab-width: 4
    loggercheck:
      kitlog: true
      klog: true
      logr: true
      slog: true
      zap: true
      require-string-key: true
      no-printf-like: true
      rules:
        - k8s.io/klog/v2.InfoS
        - (github.com/go-logr/logr.Logger).Error
        - (*go.uber.org/zap.SugaredLogger).With
    misspell:
      locale: US
      ignore-rules: []
      extra-words:
        - typo: "iff"
          correction: "if"
        - typo: "cancelation"
          correction: "cancellation"
      mode: default
    mnd:
      checks:
        - argument
        - assign
        - case
        - condition
        - operation
        - return
      ignored-numbers: []
      ignored-files:
        - 'magic1_.+\.go$'
      ignored-functions:
        - '^math\.'
        - '^http\.StatusText$'
    modernize:
      disable:
        - stringsbuilder
    musttag:
      functions:
        - name: github.com/hashicorp/hcl/v2/hclsimple.DecodeFile
          tag: hcl
          arg-pos: 2
    nilnil:
      only-two: false
      detect-opposite: true
      checked-types:
        - chan
        - func
        - iface
        - map
        - ptr
        - uintptr
        - unsafeptr
    nolintlint:
      allow-unused: false
      allow-no-explanation: []
      require-explanation: true
      require-specific: true
    perfsprint:
      integer-format: true
      int-conversion: true
      error-format: true
      err-error: true
      errorf: false
      string-format: false
      sprintf1: false
      strconcat: false
      bool-format: true
      hex-format: true
      concat-loop: true
      loop-other-ops: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    predeclared:
      ignore: []
      qualified-name: true
    promlinter:
      strict: true
      disabled-linters: []
    protogetter:
      skip-generated-by: []
      skip-files:
        - "*.pb.go"
      skip-any-generated: true
      replace-first-arg-in-append: false
    recvcheck:
      disable-builtin: false
      exclusions:
        - "*.Scan"
        - "*.UnmarshalJSON"
        - "*.UnmarshalText"
        - "*.UnmarshalYAML"
    revive:
      confidence: 0.01
      rules:
        - name: add-constant
          disabled: false
          exclude: ["TEST"]
          arguments:
            - max-lit-count: "1"
              allow-strs: '""'
              allow-ints: "0,1"
              allow-floats: "0.0,1.0"
              ignore-funcs: WriteHeader, http.NewRequest, http.NewRequestWithContext, http.Error, http.StatusText, http.Redirect, http.RedirectHandler, httptest.NewRequest, syslog.New, syslog.Dial, syslog.NewLogger, time.Date, Debug, DebugContext, Info, InfoContext, Warn, WarnContext, Error, ErrorContext, fmt\.(?:Printf|Sprintf|Fprintf|Scanf|Fscanf|Sscanf)$, strings.*
        - name: argument-limit
          disabled: false
          exclude: [""]
          arguments: [4]
        - name: atomic
          disabled: true
          exclude: [""]
        - name: banned-characters
          disabled: true
          exclude: [""]
          arguments: []
        - name: bare-return
          disabled: false
          exclude: [""]
        - name: blank-imports
          disabled: false
